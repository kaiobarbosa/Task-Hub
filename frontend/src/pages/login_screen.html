<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Acesse ou crie a sua conta no TASK-HUB." />
    <title>Entrar | TASK-HUB</title>
    <link rel="stylesheet" href="../assets/style/login/login.css" />
    <script src="../utils/show_password.js" defer></script>
  </head>
  <body>
    <main class="login-page">
      <section class="auth-shell" aria-label="Acesso à conta">
        <input
          class="auth-state"
          type="radio"
          name="auth-view"
          id="show-login"
          aria-label="Mostrar formulário de login"
          checked
        />
        <input
          class="auth-state"
          type="radio"
          name="auth-view"
          id="show-register"
          aria-label="Mostrar formulário de cadastro"
        />

        <div class="auth-stage">
          <div class="auth-track">
            <form class="auth-form login-form" action="#" method="post">
              <div class="form-content">
                <h1>Bem Vindo</h1>

                <div class="field">
                  <label for="login-email">E-mail</label>
                  <input
                    id="login-email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    placeholder="Digite o seu email..."
                    required
                  />
                </div>

                <div class="field">
                  <label for="login-password">Senha</label>
                  <div class="password-control">
                    <input
                      id="login-password"
                      name="password"
                      type="password"
                      autocomplete="current-password"
                      placeholder="Digite a sua senha..."
                      required
                    />
                    <button
                      class="password-toggle"
                      type="button"
                      data-password-toggle
                      data-password-target="login-password"
                      aria-controls="login-password"
                      aria-pressed="false"
                      aria-label="Mostrar senha"
                    >
                      Mostrar
                    </button>
                  </div>
                </div>

                <p class="form-switch">
                  Nao tem uma conta ainda?
                  <label class="switch-link" for="show-register">Crie aqui.</label>
                </p>

                <button class="submit-button" type="submit">Entrar</button>
              </div>
            </form>

            <form class="auth-form register-form" action="#" method="post">
              <div class="form-content">
                <h2>Crie sua conta</h2>

                <div class="field">
                  <label for="register-first-name">Nome</label>
                  <input
                    id="register-first-name"
                    name="first-name"
                    type="text"
                    autocomplete="given-name"
                    placeholder="Digite o seu nome..."
                    required
                  />
                </div>

                <div class="field">
                  <label for="register-last-name">Sobrenome</label>
                  <input
                    id="register-last-name"
                    name="last-name"
                    type="text"
                    autocomplete="family-name"
                    placeholder="Digite o seu sobrenome..."
                    required
                  />
                </div>

                <div class="field">
                  <label for="register-phone">Número de telefone</label>
                  <input
                    id="register-phone"
                    name="phone"
                    type="tel"
                    autocomplete="tel"
                    placeholder="Digite a seu numero de telefone..."
                    required
                  />
                </div>

                <div class="field">
                  <label for="register-email">E-mail</label>
                  <input
                    id="register-email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    placeholder="Digite o seu email..."
                    required
                  />
                </div>

                <div class="field">
                  <label for="register-password">Senha</label>
                  <div class="password-control">
                    <input
                      id="register-password"
                      name="password"
                      type="password"
                      autocomplete="new-password"
                      placeholder="Digite o sua senha..."
                      required
                    />
                    <button
                      class="password-toggle"
                      type="button"
                      data-password-toggle
                      data-password-target="register-password"
                      aria-controls="register-password"
                      aria-pressed="false"
                      aria-label="Mostrar senha"
                    >
                      Mostrar
                    </button>
                  </div>
                </div>

                <div class="field">
                  <label for="register-password-confirmation">Confirmar senha</label>
                  <div class="password-control">
                    <input
                      id="register-password-confirmation"
                      name="password-confirmation"
                      type="password"
                      autocomplete="new-password"
                      placeholder="Digite novamente a senha..."
                      required
                    />
                    <button
                      class="password-toggle"
                      type="button"
                      data-password-toggle
                      data-password-target="register-password-confirmation"
                      aria-controls="register-password-confirmation"
                      aria-pressed="false"
                      aria-label="Mostrar senha"
                    >
                      Mostrar
                    </button>
                  </div>
                </div>

                <p class="form-switch">
                  Já tem uma conta?
                  <label class="switch-link" for="show-login">Entre aqui.</label>
                </p>

                <button class="submit-button" type="submit">Criar conta</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

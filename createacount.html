<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - Tema Escuro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-container">
    <h2>Criar sua conta</h2>
    <p>Preencha os campos abaixo para se cadastrar</p>
    
    <form id="form-cadastro">
      <div class="input-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" required>
      </div>

      <div class="input-group">
        <label for="sobrenome">Sobrenome</label>
        <input type="text" id="sobrenome" placeholder="Seu sobrenome" required>
      </div>

      <div class="input-group">
        <label for="cep">CEP</label>
        <input type="text" id="cep" placeholder="00000-000" maxlength="9" required>
      </div>
      
      <div class="input-group">
        <label for="email-cadastro">E-mail</label>
        <input type="email" id="email-cadastro" placeholder="seu@email.com" required>
      </div>
      
      <div class="input-group">
        <label for="senha-cadastro">Senha</label>
        <input type="password" id="senha-cadastro" placeholder="Crie uma senha" required>
      </div>

      <div class="input-group">
        <label for="confirma-senha">Confirme a Senha</label>
        <input type="password" id="confirma-senha" placeholder="Repita a senha" required>
      </div>
      
      <button type="submit" id="send-btn">Cadastrar Conta</button>

      <div class="cadastro-link">
        <p>Já tem uma conta? <a href="index.html">Fazer Login</a></p>
      </div>
    </form>
  </div>

  <script src="javascript/cadastro.js"></script>
</body>
</html>
